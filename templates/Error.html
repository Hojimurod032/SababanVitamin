<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toast Bildirishnomalar – Sababan Vitamin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Inter:wght@400;500;600;700&display=swap"
          rel="stylesheet">
    <style>
        #toast-container {
            position: fixed;
            top: 80px; /* navbardan pastroq */
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
            max-width: 360px;
            width: calc(100vw - 40px);
        }

        /* ---------- BASE TOAST ---------- */
        .toast {
            pointer-events: all;
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1.5px solid transparent;
            background: #fff;
            box-shadow: 0 4px 24px rgba(0, 0, 0, .10), 0 1px 4px rgba(0, 0, 0, .06);
            font-family: 'Inter', system-ui, sans-serif;
            font-size: 14px;
            line-height: 1.5;
            cursor: pointer;
            position: relative;
            overflow: hidden;

            /* entry animation */
            opacity: 0;
            transform: translateX(calc(100% + 24px));
            transition: opacity .32s ease, transform .32s cubic-bezier(.22, .68, 0, 1.2);
        }

        .toast.show {
            opacity: 1;
            transform: translateX(0);
        }

        .toast.hide {
            opacity: 0;
            transform: translateX(calc(100% + 24px));
            transition: opacity .25s ease, transform .25s ease;
        }

        /* ---------- PROGRESS BAR ---------- */
        .toast-progress {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 3px;
            border-radius: 0 0 0 12px;
            width: 100%;
            transform-origin: left;
            animation: toast-shrink 5s linear forwards;
        }

        @keyframes toast-shrink {
            from {
                transform: scaleX(1);
            }
            to {
                transform: scaleX(0);
            }
        }

        /* ---------- ICON WRAP ---------- */
        .toast-icon {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 18px;
        }

        /* ---------- BODY ---------- */
        .toast-body {
            flex: 1;
            min-width: 0;
        }

        .toast-title {
            font-weight: 700;
            font-size: 14px;
            margin-bottom: 2px;
            line-height: 1.3;
        }

        .toast-msg {
            font-size: 13px;
            line-height: 1.5;
        }

        /* ---------- CLOSE BTN ---------- */
        .toast-close {
            background: none;
            border: none;
            cursor: pointer;
            padding: 2px;
            border-radius: 4px;
            color: inherit;
            opacity: .45;
            font-size: 18px;
            line-height: 1;
            flex-shrink: 0;
            align-self: flex-start;
            transition: opacity .15s;
        }

        .toast-close:hover {
            opacity: .9;
        }

        /* ══════════════════════════════════════
           VARIANTS
        ══════════════════════════════════════ */

        /* ── SUCCESS ── */
        .toast-success {
            background: #f0faf5;
            border-color: #74C69D;
            color: #1B2E28;
        }

        .toast-success .toast-icon {
            background: #D8F3DC;
            color: #2D6A4F;
        }

        .toast-success .toast-title {
            color: #2D6A4F;
        }

        .toast-success .toast-msg {
            color: #3D5A50;
        }

        .toast-success .toast-progress {
            background: #40916C;
        }

        /* ── INFO ── */
        .toast-info {
            background: #eff6ff;
            border-color: #93c5fd;
            color: #1e3a5f;
        }

        .toast-info .toast-icon {
            background: #dbeafe;
            color: #1d4ed8;
        }

        .toast-info .toast-title {
            color: #1d4ed8;
        }

        .toast-info .toast-msg {
            color: #2563ab;
        }

        .toast-info .toast-progress {
            background: #3b82f6;
        }

        /* ── WARNING ── */
        .toast-warning {
            background: #fffbeb;
            border-color: #fcd34d;
            color: #3d2c00;
        }

        .toast-warning .toast-icon {
            background: #fef3c7;
            color: #b45309;
        }

        .toast-warning .toast-title {
            color: #92400e;
        }

        .toast-warning .toast-msg {
            color: #a16207;
        }

        .toast-warning .toast-progress {
            background: #f59e0b;
        }

        /* ── ERROR / DANGER ── */
        .toast-error {
            background: #fff5f5;
            border-color: #fca5a5;
            color: #2d0000;
        }

        .toast-error .toast-icon {
            background: #fee2e2;
            color: #dc2626;
        }

        .toast-error .toast-title {
            color: #991b1b;
        }

        .toast-error .toast-msg {
            color: #b91c1c;
        }

        .toast-error .toast-progress {
            background: #ef4444;
        }

        /* ---------- MOBILE ---------- */
        @media (max-width: 480px) {
            #toast-container {
                top: 70px;
                right: 12px;
                left: 12px;
                max-width: 100%;
                width: auto;
            }
        }


        /* ═══════════════════════════════════════
           DEMO PAGE STYLES (faqat ko'rgazma uchun)
        ═══════════════════════════════════════ */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --green-dark: #2D6A4F;
            --green-mid: #40916C;
            --green-light: #74C69D;
            --green-pale: #D8F3DC;
            --off-white: #F8FAF9;
            --gray-100: #F0F4F2;
            --gray-300: #C8D8D0;
            --gray-500: #7A9E90;
            --gray-700: #3D5A50;
            --gray-900: #1B2E28;
            --font-display: 'Playfair Display', Georgia, serif;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--off-white);
            color: var(--gray-900);
            min-height: 100vh;
        }

        .navbar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(255, 255, 255, .95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--gray-100);
            box-shadow: 0 2px 8px rgba(45, 106, 79, .10);
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            align-items: center;
            gap: 24px;
            height: 64px;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }

        .logo-icon {
            font-size: 24px;
        }

        .logo-text {
            font-family: var(--font-display);
            font-size: 20px;
            font-weight: 700;
            color: var(--gray-900);
        }

        .logo-accent {
            color: var(--green-mid);
        }

        .demo-wrap {
            max-width: 860px;
            margin: 0 auto;
            padding: 48px 24px 80px;
        }

        .demo-eyebrow {
            font-size: 12px;
            font-weight: 600;
            letter-spacing: .1em;
            text-transform: uppercase;
            color: var(--green-mid);
            margin-bottom: 8px;
        }

        .demo-title {
            font-family: var(--font-display);
            font-size: clamp(24px, 3vw, 34px);
            font-weight: 800;
            color: var(--gray-900);
            margin-bottom: 12px;
        }

        .demo-desc {
            font-size: 15px;
            color: var(--gray-500);
            line-height: 1.7;
            margin-bottom: 40px;
        }

        /* Trigger buttons grid */
        .demo-grid {
            display: grid;
            grid-template-columns:repeat(2, 1fr);
            gap: 16px;
            margin-bottom: 48px;
        }

        @media (max-width: 540px) {
            .demo-grid {
                grid-template-columns:1fr;
            }
        }

        .demo-card {
            background: #fff;
            border-radius: 14px;
            border: 1.5px solid var(--gray-100);
            padding: 24px 20px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 10px;
        }

        .demo-card-icon {
            width: 44px;
            height: 44px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }

        .demo-card-name {
            font-weight: 700;
            font-size: 15px;
        }

        .demo-card-desc {
            font-size: 13px;
            color: var(--gray-500);
            line-height: 1.5;
        }

        .demo-card-btn {
            margin-top: 4px;
            padding: 9px 20px;
            border: none;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity .15s, transform .1s;
        }

        .demo-card-btn:hover {
            opacity: .88;
        }

        .demo-card-btn:active {
            transform: scale(.97);
        }

        /* card colors */
        .card-success .demo-card-icon {
            background: #D8F3DC;
        }

        .card-success .demo-card-btn {
            background: #40916C;
            color: #fff;
        }

        .card-info .demo-card-icon {
            background: #dbeafe;
        }

        .card-info .demo-card-btn {
            background: #3b82f6;
            color: #fff;
        }

        .card-warning .demo-card-icon {
            background: #fef3c7;
        }

        .card-warning .demo-card-btn {
            background: #f59e0b;
            color: #fff;
        }

        .card-error .demo-card-icon {
            background: #fee2e2;
        }

        .card-error .demo-card-btn {
            background: #ef4444;
            color: #fff;
        }

        /* Code block */
        .code-section {
            margin-top: 40px;
        }

        .code-label {
            font-size: 13px;
            font-weight: 700;
            color: var(--gray-700);
            margin-bottom: 10px;
            letter-spacing: .04em;
            text-transform: uppercase;
        }

        .code-block {
            background: #1B2E28;
            border-radius: 12px;
            padding: 24px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.7;
            color: #D8F3DC;
            overflow-x: auto;
        }

        .code-block .c-tag {
            color: #74C69D;
        }

        .code-block .c-attr {
            color: #E9C46A;
        }

        .code-block .c-val {
            color: #fca5a5;
        }

        .code-block .c-comm {
            color: #7A9E90;
            font-style: italic;
        }

        .code-block .c-fn {
            color: #93c5fd;
        }

        .code-block .c-str {
            color: #fef3c7;
        }

        .tabs {
            display: flex;
            gap: 0;
            border-bottom: 2px solid var(--gray-100);
            margin-bottom: 20px;
        }

        .tab {
            padding: 10px 20px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            background: none;
            color: var(--gray-500);
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            transition: color .2s, border-color .2s;
        }

        .tab.active {
            color: var(--green-dark);
            border-bottom-color: var(--green-mid);
        }

        .tab-pane {
            display: none;
        }

        .tab-pane.active {
            display: block;
        }
    </style>
</head>
<body>

<div id="toast-container" role="region" aria-label="Bildirishnomalar" aria-live="polite"></div>


<script>
    const ICONS = {
        success: '✅',
        info: 'ℹ️',
        warning: '⚠️',
        error: '❌',
        danger: '❌',
    };
    const TITLES = {
        success: 'Muvaffaqiyat!',
        info: 'Ma\'lumot',
        warning: 'Diqqat!',
        error: 'Xatolik!',
        danger: 'Xatolik!',
    };

    function getTitle(tag) {
        const clean = tag.replace(/\s+/g, ' ').trim().split(' ').find(t => TITLES[t]) || 'info';
        return TITLES[clean];
    }

    function showToast(type, title, msg, duration = 5000) {
        const cleanType = ['success', 'info', 'warning', 'error', 'danger'].includes(type)
            ? (type === 'danger' ? 'error' : type)
            : 'info';

        const wrap = document.getElementById('toast-container');
        const t = document.createElement('div');
        t.className = `toast toast-${cleanType}`;
        t.setAttribute('role', 'alert');
        t.innerHTML = `
        <div class="toast-icon">${ICONS[cleanType]}</div>
        <div class="toast-body">
          <div class="toast-title">${title}</div>
          <div class="toast-msg">${msg}</div>
        </div>
        <button class="toast-close" aria-label="Yopish">&times;</button>
        <div class="toast-progress" style="animation-duration:${duration}ms"></div>
      `;

        wrap.appendChild(t);
        requestAnimationFrame(() => requestAnimationFrame(() => t.classList.add('show')));

        const dismiss = () => {
            t.classList.add('hide');
            setTimeout(() => t.remove(), 300);
        };

        t.querySelector('.toast-close').addEventListener('click', e => {
            e.stopPropagation();
            dismiss();
        });
        t.addEventListener('click', dismiss);
        setTimeout(dismiss, duration);
    }

    {% for message in messages %}
        showToast('{{ message.tags }}', getTitle('{{ message.tags }}'), '{{ message|escapejs }}');
    {% endfor %}

    function switchTab(btn, paneId) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(paneId).classList.add('active');
    }
</script>

</body>
</html>
